commit-msg:
  commands:
    commitlint:
      run: PATH="$HOME/.local/share/mise/shims:$PATH" ./node_modules/.bin/commitlint --edit {1}

pre-push:
  commands:
    protect-main:
      run: |
        current_branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$current_branch" != "main" ]; then
          remote_ref="{push_reference}"
          if echo "$remote_ref" | grep -q "refs/heads/main"; then
            echo "❌ Cannot push to main from branch '$current_branch'. Merge locally first."
            exit 1
          fi
        fi

pre-merge-commit:
  commands:
    require-rebase:
      run: |
        echo "⚠️  Use 'git rebase' instead of 'git merge' for feature branches."
        echo "   Run: git rebase main (from your feature branch)"
        echo "   Then: git checkout main && git merge --ff-only <branch>"
        exit 1
