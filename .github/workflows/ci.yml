name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: pnpm nx affected -t lint --exclude='tag:platform:macos'

      - name: Build affected
        run: pnpm nx affected -t build --exclude='tag:platform:macos'

      - name: Test affected
        run: pnpm nx affected -t test --exclude='tag:platform:macos'
